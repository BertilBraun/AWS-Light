networks:
  internal:
    driver: bridge

volumes:
  postgres-data:
  storage-data:

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [internal]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: awslight
      POSTGRES_USER: awslight
      POSTGRES_PASSWORD: awslight
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awslight"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  control-plane:
    build:
      context: .
      dockerfile: services/control-plane/Dockerfile
    restart: unless-stopped
    networks: [internal]
    ports: ["8000:8000"]
    volumes:
      - storage-data:/app/data/storage
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).read()\""]
      interval: 3s
      timeout: 5s
      retries: 10

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    restart: unless-stopped
    networks: [internal]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env
    depends_on:
      postgres:      { condition: service_healthy }
      redis:         { condition: service_healthy }
      control-plane: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "test", "-f", "/app/healthy"]
      interval: 1s
      timeout: 2s
      retries: 60

  proxy:
    build:
      context: .
      dockerfile: services/proxy/Dockerfile
    restart: unless-stopped
    networks: [internal]
    ports: ["8080:8080"]
    env_file: .env
    depends_on:
      redis:        { condition: service_healthy }
      orchestrator: { condition: service_healthy }

  health-checker:
    build:
      context: .
      dockerfile: services/health-checker/Dockerfile
    restart: unless-stopped
    networks: [internal]
    env_file: .env
    depends_on:
      postgres:      { condition: service_healthy }
      redis:         { condition: service_healthy }
      control-plane: { condition: service_healthy }
      orchestrator:  { condition: service_healthy }

  autoscaler:
    build:
      context: .
      dockerfile: services/autoscaler/Dockerfile
    restart: unless-stopped
    networks: [internal]
    env_file: .env
    depends_on:
      postgres:      { condition: service_healthy }
      redis:         { condition: service_healthy }
      control-plane: { condition: service_healthy }
