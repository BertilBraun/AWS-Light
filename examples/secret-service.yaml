apiVersion: aws-light/v1
kind: Secrets
secrets:
  my-secret: hello-from-secret
  another-secret: second-secret-value
---
apiVersion: aws-light/v1
kind: Service
metadata:
  name: secret-service
spec:
  image: aws-light/secret-service:latest
  replicas: 1
  minReplicas: 1
  maxReplicas: 4
  cpuRequest: 0.2
  memoryRequestMb: 128
  port: 8000
  healthCheckPath: /health
  ingress:
    external: true
  env: {}
  secretRefs:
    - my-secret
    - another-secret
